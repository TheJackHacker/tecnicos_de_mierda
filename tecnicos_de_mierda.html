            --panel: #1a1a1a;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--panel);
            padding: 30px;
            border-radius: 12px;
            border: 2px solid #333;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* Pantallas */
        .screen { display: none; }
        .active { display: block; }

        h1 { font-size: 1.5rem; margin-bottom: 30px; letter-spacing: 2px; }
        
        /* Botones de Selección */
        .menu-grid {
            display: grid;
            gap: 15px;
        }

        .btn-sector {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid;
            background: transparent;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-video { color: var(--video-color); border-color: var(--video-color); }
        .btn-luces { color: var(--luces-color); border-color: var(--luces-color); }
        .btn-sonido { color: var(--sonido-color); border-color: var(--sonido-color); }

        .btn-sector:active { transform: scale(0.95); background: white; color: black; }

        /* Pantalla de Juego */
        #display-sector-title { text-transform: uppercase; font-size: 0.8rem; margin-bottom: 10px; }
        #question-text {
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin-bottom: 30px;
            font-weight: bold;
            line-height: 1.4;
        }

        .main-btn {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            background: white;
            color: black;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .back-btn {
            background: transparent;
            color: #666;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.8rem;
        }

        .footer { margin-top: 20px; font-size: 0.6rem; color: #444; }
    </style>
</head>

                "¿Quién tarda más en encontrar sus guantes?",
                "¿Quién se equivoca de salida en la matriz?",
                "¿Quién da lecciones sobre decibelios sin saber multiplicar?",
                "¿Quién tiene el solo-bus siempre activado sin querer?",
                "¿Quién busca mesas viejas para decir que son 'vintage'?",
                "¿Quién dejaría un micro abierto cerca de un altavoz causando feedback?",
                "¿Quién tiene siempre las manos manchadas de pegamento de cinta?",
                "¿Quién cambia la configuración de la mesa 1 minuto antes?",
                "¿Quién se caería de la tarima por no mirar?",
                "¿Quién dice que el músico no sabe cuando él no sabe el patch?",
                "¿Quién discute con los locales sobre cómo se pone un micro?",
                "¿Quién se apropia de la mejor silla del control?",
                "¿Quién olvidaría conectar la manguera de datos del rack?",
                "¿Quién se cree el jefe de sonido por llevar un analizador de mano?",
                "¿Quién tiene el cajón de adaptadores más caótico?",
                "¿Quién ha dicho más veces 'eso en el show no se va a notar'?"
            ]
        };

        function startGame(sector) {
            currentSector = sector;
            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            
            const title = document.getElementById('display-sector-title');
            title.innerText = "MODO: " + sector;
            title.style.color = `var(--${sector}-color)`;
            
            nextQuestion();
        }

        function goHome() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('home-screen').classList.add('active');
        }

        function nextQuestion() {
            const list = questions[currentSector];
            const display = document.getElementById('question-text');
            const randomIndex = Math.floor(Math.random() * list.length);
            
            // Efecto flash rápido
            display.style.opacity = 0;
            setTimeout(() => {
                display.innerText = list[randomIndex];
                display.style.opacity = 1;
            }, 100);
        }
    </script>
